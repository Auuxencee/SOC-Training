<!--
  WAZUH MANAGER — CONFIGURATION SQUELETTE
  ========================================
  Ce fichier est le point de départ de ta configuration SOC.
  Il est volontairement minimal. À toi de l'enrichir au fil des niveaux.

  Structure :
  - <global>      : paramètres globaux (logs, alertes)
  - <alerts>      : seuils d'alerte
  - <syscheck>    : surveillance d'intégrité fichiers (FIM)
  - <rootcheck>   : détection rootkit/anomalies
  - <localfile>   : sources de logs à surveiller
  - <rules>       : chargement des règles de détection
-->

<ossec_config>

  <!-- ===================== PARAMÈTRES GLOBAUX ===================== -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>            <!-- Mettre à "yes" pour debug complet -->
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>smtp.example.wazuh.com</smtp_server>
    <email_from>wazuh@example.wazuh.com</email_from>
    <email_to>recipient@example.wazuh.com</email_to>
    <email_maxperhour>12</email_maxperhour>
    <email_log_source>alerts.log</email_log_source>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <!-- ===================== SEUILS D'ALERTE ===================== -->
  <alerts>
    <log_alert_level>3</log_alert_level>   <!-- Niveau minimum pour logguer -->
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- ===================== API WAZUH ===================== -->
  <api>
    <https>yes</https>
  </api>

  <!-- ===================== SURVEILLANCE INTÉGRITÉ (FIM) ===================== -->
  <!--
    FIM = File Integrity Monitoring
    Détecte les modifications non autorisées sur les fichiers critiques.
    TODO Niveau 1 : activer la surveillance sur /etc et /bin
  -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>   <!-- Scan toutes les 12h -->
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>

    <!-- Répertoires à surveiller — À COMPLÉTER -->
    <directories>/etc,/usr/bin,/usr/sbin</directories>
    <directories>/bin,/sbin</directories>

    <!-- Répertoires à ignorer -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/httpd/logs</ignore>
    <ignore>/etc/utmpx</ignore>
    <ignore>/etc/wtmpx</ignore>
    <ignore>/etc/cups/certs</ignore>
    <ignore>/etc/dumpdates</ignore>
    <ignore>/etc/svc/volatile</ignore>

    <nodiff>/etc/ssl/private.key</nodiff>
    <skip_nfs>yes</skip_nfs>
    <skip_dev>yes</skip_dev>
    <skip_proc>yes</skip_proc>
    <skip_sys>yes</skip_sys>
    <process_priority>10</process_priority>
    <max_eps>50</max_eps>
    <sync_enabled>yes</sync_enabled>
    <sync_interval>300</sync_interval>
    <sync_response_timeout>30</sync_response_timeout>
    <sync_queue_size>16384</sync_queue_size>
    <sync_max_eps>10</sync_max_eps>
  </syscheck>

  <!-- ===================== DÉTECTION ROOTKIT ===================== -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
    <rootkit_files>etc/shared/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>etc/shared/rootkit_trojans.txt</rootkit_trojans>
    <system_audit>etc/shared/system_audit_rcl.txt</system_audit>
    <system_audit>etc/shared/system_audit_ssh.txt</system_audit>
    <system_audit>etc/shared/cis_debian_linux_rcl.txt</system_audit>
    <skip_nfs>yes</skip_nfs>
  </rootcheck>

  <!-- ===================== SOURCES DE LOGS ===================== -->
  <!--
    Chaque <localfile> définit une source de log à ingérer.
    TODO : Ajouter d'autres sources selon les besoins (nginx, apache, etc.)
  -->

  <!-- Logs système Linux -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/active-responses.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

  <localfile>
    <log_format>command</log_format>
    <command>df -P</command>
    <frequency>360</frequency>
  </localfile>

  <localfile>
    <log_format>full_command</log_format>
    <command>netstat -tulpn | sed 's/\([[:alnum:]]\+\)\ \+[[:digit:]]\+\ \+[[:digit:]]\+\ \+\(.*\):\([[:digit:]]*\)\ \+\([0-9\.\:\*]\+\).\+\ \([[:digit:]]*\/[[:alnum:]\_\-]*\).*/\1 \2 == \3 == \4 \5/' | sort -k 4 -g | sed 's/ == \(.*\) ==/:\1/' | head -n 128</command>
    <alias>netstat listening ports</alias>
    <frequency>360</frequency>
  </localfile>

  <localfile>
    <log_format>full_command</log_format>
    <command>last -n 20</command>
    <frequency>360</frequency>
  </localfile>

  <!-- ===================== CHARGEMENT DES RÈGLES ===================== -->
  <ruleset>
    <!-- Règles par défaut Wazuh -->
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
    <list>etc/lists/security-eventchannel</list>

    <!-- Tes règles custom — À COMPLÉTER dans local_rules.xml -->
    <rule_dir>etc/rules</rule_dir>
    <decoder_dir>etc/decoders</decoder_dir>
  </ruleset>

  <!-- ===================== RÉPONSE ACTIVE ===================== -->
  <!--
    Les active responses permettent de bloquer automatiquement des IPs.
    TODO Niveau 1 : configurer un blocage auto sur brute force SSH (rule 5763)
  -->
  <active-response>
    <disabled>yes</disabled>    <!-- Activé manuellement au Niveau 1 -->
  </active-response>

  <!-- ===================== CLUSTER (désactivé) ===================== -->
  <cluster>
    <name>wazuh</name>
    <node_name>master-node</node_name>
    <node_type>master</node_type>
    <key>wazuh-training-key-placeholder</key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes>
      <node>127.0.0.1</node>
    </nodes>
    <hidden>no</hidden>
    <disabled>yes</disabled>
  </cluster>

</ossec_config>
